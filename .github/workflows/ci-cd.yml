name: GamingList CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build y Pruebas Automatizadas
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 2. Instala Java 21
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Da permisos de ejecución al wrapper de Maven
      - name: Permisos al wrapper de Maven
        run: chmod +x mvnw
        working-directory: GamingList-main

      # 4. Compila el proyecto y ejecuta todas las pruebas JUnit
      - name: Compilar y ejecutar pruebas
        run: ./mvnw clean verify
        working-directory: GamingList-main

      # 5. Publica el resultado de las pruebas en la pestaña Actions
      - name: Publicar resultados de pruebas JUnit
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: GamingList-main/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # 6. Sube el reporte de cobertura JaCoCo como archivo descargable
      - name: Subir reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-cobertura-jacoco
          path: GamingList-main/target/site/jacoco/
          retention-days: 30

      # 7. Envía métricas del CI a Grafana Cloud
      - name: Enviar metricas a Grafana Cloud
        if: always()
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_PROM_URL }}
          GRAFANA_USER: ${{ secrets.GRAFANA_PROM_USER }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
        run: |
          # Determinar si el build fue exitoso (1) o fallido (0)
          BUILD_STATUS=$([[ "${{ job.status }}" == "success" ]] && echo 1 || echo 0)

          # Extraer totales de tests desde los reportes XML de Surefire
          TESTS_TOTAL=$(grep -rh 'tests="' GamingList-main/target/surefire-reports/*.xml 2>/dev/null \
            | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
          TESTS_FAILED=$(grep -rh 'failures="' GamingList-main/target/surefire-reports/*.xml 2>/dev/null \
            | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
          TESTS_ERRORS=$(grep -rh 'errors="' GamingList-main/target/surefire-reports/*.xml 2>/dev/null \
            | grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
          TESTS_PASSED=$((TESTS_TOTAL - TESTS_FAILED - TESTS_ERRORS))

          BRANCH="${{ github.ref_name }}"

          # Construir el payload en formato Prometheus exposition
          METRICS="# HELP gaminglist_ci_build_success Estado del build (1=exitoso, 0=fallido)
          # TYPE gaminglist_ci_build_success gauge
          gaminglist_ci_build_success{branch=\"$BRANCH\",repo=\"GamingList\"} $BUILD_STATUS
          # HELP gaminglist_ci_tests_total Total de pruebas ejecutadas
          # TYPE gaminglist_ci_tests_total gauge
          gaminglist_ci_tests_total{branch=\"$BRANCH\"} $TESTS_TOTAL
          # HELP gaminglist_ci_tests_passed Pruebas que pasaron
          # TYPE gaminglist_ci_tests_passed gauge
          gaminglist_ci_tests_passed{branch=\"$BRANCH\"} $TESTS_PASSED
          # HELP gaminglist_ci_tests_failed Pruebas que fallaron
          # TYPE gaminglist_ci_tests_failed gauge
          gaminglist_ci_tests_failed{branch=\"$BRANCH\"} $TESTS_FAILED"

          # Enviar a Grafana Cloud (pushgateway endpoint)
          echo "$METRICS" | curl -s --fail \
            -u "$GRAFANA_USER:$GRAFANA_TOKEN" \
            --data-binary @- \
            "${GRAFANA_URL}/push/metrics/job/github-actions/instance/GamingList" \
            && echo "Metricas enviadas a Grafana Cloud" \
            || echo "No se pudieron enviar las metricas"
