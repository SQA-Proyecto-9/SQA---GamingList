name: GamingList CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build y Pruebas Automatizadas
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 2. Instala Java 21
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Da permisos de ejecución al wrapper de Maven
      - name: Permisos al wrapper de Maven
        run: chmod +x mvnw
        working-directory: GamingList-main

      # 4. Compila el proyecto y ejecuta todas las pruebas JUnit
      - name: Compilar y ejecutar pruebas
        run: ./mvnw clean verify
        working-directory: GamingList-main

      # 5. Publica el resultado de las pruebas en la pestaña Actions
      - name: Publicar resultados de pruebas JUnit
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: GamingList-main/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # 6. Sube el reporte de cobertura JaCoCo como archivo descargable
      - name: Subir reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-cobertura-jacoco
          path: GamingList-main/target/site/jacoco/
          retention-days: 30
