name: GamingList CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build y Pruebas Automatizadas CI/CD
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 2. Instala Java 21
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 2b. Instala Node.js (necesario para Newman más adelante)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Da permisos de ejecución al wrapper de Maven
      - name: Permisos al wrapper de Maven
        run: chmod +x mvnw
        working-directory: GamingList-main

      # 4. Compila el proyecto y ejecuta todas las pruebas JUnit
      #    -Dsurefire.useFile=false → imprime la salida de cada prueba directamente
      #    en el log de consola de Actions (visible en este mismo paso, sin ir a Checks)
      - name: Compilar y ejecutar pruebas
        run: ./mvnw clean verify -Dsurefire.useFile=false
        working-directory: GamingList-main

      # 5. Publica el resultado de las pruebas JUnit en la pestaña Actions
      #    NOTA: dorny/test-reporter crea una "Check Run" visible en la pestaña Checks
      #    del PR/commit con el detalle de cada metodo de prueba (verde/rojo).
      #    Para verlo: Actions → workflow run → pestaña "Checks" o sección "Annotations".
      - name: Publicar resultados de pruebas JUnit
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit (Pruebas Unitarias)
          path: GamingList-main/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # 6. Sube el reporte de cobertura JaCoCo como archivo descargable
      - name: Subir reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-cobertura-jacoco
          path: GamingList-main/target/site/jacoco/
          retention-days: 30

      # 7a. Arranca el backend real (JAR ya compilado en el paso 4) en background
      - name: Arrancar Backend Spring Boot (real)
        run: |
          JAR=$(find GamingList-main/target -name "*.jar" ! -name "*plain*" | head -1)
          echo "Arrancando JAR: $JAR"
          nohup java -jar "$JAR" > backend.log 2>&1 &
          echo "Esperando a que el backend levante en :8080..."
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/api/videojuegos/consultar > /dev/null 2>&1; then
              echo "Backend listo en el intento $i"; break;
            fi
            sleep 3
          done

      # 7b. Instala Newman
      - name: Instalar Newman
        run: npm install -g newman

      # 7c. Crea entorno Newman apuntando al backend real (:8080)
      - name: Crear entorno Newman para backend real
        run: |
          mkdir -p reports
          cat > entorno_real.json << 'EOF'
          {
            "id": "environ-real",
            "name": "Entorno Real Backend",
            "values": [
              { "key": "baseUrl", "value": "http://localhost:8080", "enabled": true },
              { "key": "password", "value": "Pass123!", "enabled": true }
            ],
            "timestamp": 0,
            "synced": false
          }
          EOF

      # 7d. Ejecuta las pruebas de integracion (TG-01 y TG-03) contra el backend real.
      #     Usa tres reporteros simultaneos:
      #       cli  → salida legible en el log de Actions (cada request con pass/fail)
      #       junit → XML compatible con dorny/test-reporter (visualizacion en Checks)
      #       json  → JSON estructurado del cual extraemos métricas para Grafana
      - name: "Pruebas de Integracion Newman (TG-01 y TG-03) — Backend Real"
        run: |
          newman run "MisPruebas/coleccion_TG.json" \
            -e entorno_real.json \
            -r cli,junit,json \
            --reporter-junit-export "reports/newman-results.xml" \
            --reporter-json-export  "reports/newman-summary.json" \
            --bail

      # 7e. (Diagnostico) Muestra el log del backend si algo falla
      - name: Mostrar log del backend si fallo
        if: failure()
        run: cat backend.log || echo "No se encontro backend.log"

      # 7f. Publica el reporte Newman (JUnit XML) en la misma pestaña Checks que JUnit
      - name: Publicar resultados Newman en Actions
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados Newman
          path: reports/newman-results.xml
          reporter: java-junit
          fail-on-error: false

      # 7g. Sube ambos reportes Newman como artefactos descargables
      - name: Subir reportes Newman
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-newman-integracion
          path: |
            reports/newman-results.xml
            reports/newman-summary.json
          retention-days: 30

      # ── PRUEBAS E2E CON CYPRESS (Sistema y Aceptación) ────────────────────
      # El backend real ya está corriendo en :8080 desde el paso 7a.
      # Aqui arrancamos el frontend (Vite) y ejecutamos las pruebas Cypress.

      # 10a. Instalar dependencias del Frontend (Vue + Vite)
      - name: Instalar dependencias del Frontend (Vue)
        run: npm ci
        working-directory: GamingListWeb-main

      # 10b. Arrancar el Frontend (Vite) en background.
      #      --host 0.0.0.0 fuerza a Vite a escuchar en TODAS las interfaces de red
      #      (IPv4 e IPv6), evitando que Chrome no pueda conectar desde una interfaz distinta.
      #      No se necesita un curl de espera aqui porque wait-on en la action de Cypress
      #      (paso 10e) es mas robusto: espera hasta recibir un HTTP 200 completo.
      - name: Arrancar Frontend (Vite) en background
        run: nohup npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        working-directory: GamingListWeb-main

      # 10c. Instalar Cypress y mocha-junit-reporter desde el package.json raiz
      - name: Instalar Cypress
        run: npm ci

      # 10d. Crear directorio de resultados para el reporte JUnit de Cypress
      - name: Crear directorio de resultados Cypress
        run: mkdir -p cypress/results

      # 10e. Ejecutar las 4 pruebas E2E (TB-03, TB-07, TB-10, TS-01) contra el sistema real
      #      - install: false  → Cypress ya instalado en paso 10c
      #      - wait-on        → La action espera hasta que Vite devuelva HTTP 200 completo
      #                         antes de lanzar el primer test (mas fiable que curl manual)
      #      - wait-on-timeout → 2 minutos maximo de espera por el frontend
      #      - El reporter mocha-junit-reporter esta configurado en cypress.config.js
      - name: "Pruebas E2E Cypress (Sistema y Aceptacion) — Backend y Frontend Reales"
        uses: cypress-io/github-action@v6
        # continue-on-error: true → Los fallos de prueba (esperados, detectan bugs del software)
        # NO bloquean los pasos siguientes. El pipeline sigue hasta Grafana y reportes.
        continue-on-error: true
        with:
          install: false
          browser: chrome
          headed: false
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 120
        env:
          CYPRESS_baseUrl: http://localhost:5173

      # 10f. Mostrar logs del frontend si algo falla en Cypress
      - name: Mostrar log del frontend si fallo
        if: failure()
        run: cat frontend.log || echo "No se encontro frontend.log"

      # 10g. Publicar resultados Cypress en pestaña Checks de Actions
      - name: Publicar resultados Cypress en Actions
        uses: dorny/test-reporter@v1
        if: always()
        # continue-on-error: true → Si cypress/results/*.xml no existe (fallo catastrofico
        # de Cypress antes de generar reportes), dorny no bloquea el paso de Grafana.
        continue-on-error: true
        with:
          name: Resultados Cypress (Sistema / Aceptacion)
          path: cypress/results/*.xml
          reporter: java-junit
          fail-on-error: false

      # 10h. Subir videos y screenshots de Cypress como evidencia descargable
      - name: Subir evidencias de Cypress (videos y screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-evidencias
          path: |
            cypress/videos/
            cypress/screenshots/
          retention-days: 30

      # 8. Instala promtool para enviar métricas via Remote Write (Protobuf+Snappy)

      - name: Instalar promtool
        run: |
          PROM_VERSION="2.54.1"
          wget -q "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          tar -xzf "prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
          promtool --version

      # 9. Envía métricas del CI a Grafana Cloud via promtool (Remote Write)
      #    Incluye métricas JUnit (unitarias) + Newman (integración) en un solo push
      - name: Enviar metricas a Grafana Cloud
        if: always()
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_PROM_URL }}
          GRAFANA_USER: ${{ secrets.GRAFANA_PROM_USER }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
        run: |
          BUILD_STATUS=$([[ "${{ job.status }}" == "success" ]] && echo 1 || echo 0)

          # ── Métricas JUnit (pruebas unitarias) ────────────────────────────
          TESTS_TOTAL=$(grep -rh 'tests="' GamingList-main/target/surefire-reports/*.xml 2>/dev/null \
            | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
          TESTS_FAILED=$(grep -rh 'failures="' GamingList-main/target/surefire-reports/*.xml 2>/dev/null \
            | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
          TESTS_ERRORS=$(grep -rh 'errors="' GamingList-main/target/surefire-reports/*.xml 2>/dev/null \
            | grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
          TESTS_PASSED=$((TESTS_TOTAL - TESTS_FAILED - TESTS_ERRORS))

          # ── Métricas Newman (pruebas de integración) ───────────────────────
          # Se extrae del JSON generado por --reporter-json-export.
          # run.stats.requests → requests HTTP ejecutados (uno por endpoint).
          # run.stats.assertions → total de pm.test() definidos en la coleccion.
          NEWMAN_REQUESTS_TOTAL=0
          NEWMAN_REQUESTS_FAILED=0
          NEWMAN_ASSERTIONS_TOTAL=0
          NEWMAN_ASSERTIONS_FAILED=0
          if [ -f "reports/newman-summary.json" ]; then
            NEWMAN_REQUESTS_TOTAL=$(python3 -c "import json; d=json.load(open('reports/newman-summary.json')); print(d['run']['stats']['requests']['total'])" 2>/dev/null || echo 0)
            NEWMAN_REQUESTS_FAILED=$(python3 -c "import json; d=json.load(open('reports/newman-summary.json')); print(d['run']['stats']['requests']['failed'])" 2>/dev/null || echo 0)
            NEWMAN_ASSERTIONS_TOTAL=$(python3 -c "import json; d=json.load(open('reports/newman-summary.json')); print(d['run']['stats']['assertions']['total'])" 2>/dev/null || echo 0)
            NEWMAN_ASSERTIONS_FAILED=$(python3 -c "import json; d=json.load(open('reports/newman-summary.json')); print(d['run']['stats']['assertions']['failed'])" 2>/dev/null || echo 0)
          fi
          NEWMAN_ASSERTIONS_PASSED=$((NEWMAN_ASSERTIONS_TOTAL - NEWMAN_ASSERTIONS_FAILED))

          BRANCH="${{ github.ref_name }}"

          # ── Cobertura JaCoCo ───────────────────────────────────────────────
          printf 'import xml.etree.ElementTree as ET\n' > /tmp/parse_jacoco.py
          printf 'try:\n' >> /tmp/parse_jacoco.py
          printf '    tree = ET.parse("GamingList-main/target/site/jacoco/jacoco.xml")\n' >> /tmp/parse_jacoco.py
          printf '    root = tree.getroot()\n' >> /tmp/parse_jacoco.py
          printf '    line_cov, branch_cov = 0.0, 0.0\n' >> /tmp/parse_jacoco.py
          printf '    for c in root.findall("counter"):\n' >> /tmp/parse_jacoco.py
          printf '        if c.get("type") == "LINE":\n' >> /tmp/parse_jacoco.py
          printf '            m, v = int(c.get("missed", 0)), int(c.get("covered", 0))\n' >> /tmp/parse_jacoco.py
          printf '            line_cov = (v / (m + v) * 100) if (m + v) > 0 else 0.0\n' >> /tmp/parse_jacoco.py
          printf '        if c.get("type") == "BRANCH":\n' >> /tmp/parse_jacoco.py
          printf '            m, v = int(c.get("missed", 0)), int(c.get("covered", 0))\n' >> /tmp/parse_jacoco.py
          printf '            branch_cov = (v / (m + v) * 100) if (m + v) > 0 else 0.0\n' >> /tmp/parse_jacoco.py
          printf '    print(f"{line_cov:.2f} {branch_cov:.2f}")\n' >> /tmp/parse_jacoco.py
          printf 'except Exception:\n' >> /tmp/parse_jacoco.py
          printf '    print("0.00 0.00")\n' >> /tmp/parse_jacoco.py

          COVERAGE_LINE="0.00"
          COVERAGE_BRANCH="0.00"
          if [ -f "GamingList-main/target/site/jacoco/jacoco.xml" ]; then
            read COVERAGE_LINE COVERAGE_BRANCH <<< $(python3 /tmp/parse_jacoco.py)
          fi

          echo "Build status              : $BUILD_STATUS"
          echo "JUnit — Total: $TESTS_TOTAL | Pasados: $TESTS_PASSED | Fallidos: $TESTS_FAILED"
          echo "Newman Requests — Total: $NEWMAN_REQUESTS_TOTAL | Fallidos: $NEWMAN_REQUESTS_FAILED"
          echo "Newman Assertions — Total: $NEWMAN_ASSERTIONS_TOTAL | Pasadas: $NEWMAN_ASSERTIONS_PASSED | Fallidas: $NEWMAN_ASSERTIONS_FAILED"
          echo "Cobertura Lineas          : $COVERAGE_LINE %"
          echo "Cobertura Ramas           : $COVERAGE_BRANCH %"

          # ── Build verde vs rojo (via GitHub Actions API) ───────────
          RUN_DATA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}")

          CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion // "in_progress"')
          WORKFLOW_NAME=$(echo "$RUN_DATA" | jq -r '.name // "unknown"')
          ACTOR=$(echo "$RUN_DATA" | jq -r '.triggering_actor.login // .actor.login // "unknown"')
          CREATED_AT=$(echo "$RUN_DATA" | jq -r '.created_at // ""')
          UPDATED_AT=$(echo "$RUN_DATA" | jq -r '.updated_at // ""')
          BUILD_RESULT=$([[ "$CONCLUSION" == "success" ]] && echo 1 || echo 0)

          echo "Conclusion API            : $CONCLUSION"
          echo "Workflow                  : $WORKFLOW_NAME"
          echo "Actor                     : $ACTOR"
          echo "Created at                : $CREATED_AT"
          echo "Updated at                : $UPDATED_AT"

          # ── Tiempo de ejecución (via GitHub Actions API) ──────────
          JOBS_DATA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs")

          JOB_NAME=$(echo "$JOBS_DATA" | jq -r '.jobs[0].name // "build-and-test"')
          JOB_STARTED=$(echo "$JOBS_DATA" | jq -r '.jobs[0].started_at // ""')
          JOB_COMPLETED=$(echo "$JOBS_DATA" | jq -r '.jobs[0].completed_at // ""')

          STARTED_EPOCH=0
          COMPLETED_EPOCH=$(date +%s)
          if [ -n "$JOB_STARTED" ] && [ "$JOB_STARTED" != "null" ]; then
            STARTED_EPOCH=$(date -d "$JOB_STARTED" +%s 2>/dev/null || echo 0)
          fi
          if [ -n "$JOB_COMPLETED" ] && [ "$JOB_COMPLETED" != "null" ] && [ "$JOB_COMPLETED" != "" ]; then
            COMPLETED_EPOCH=$(date -d "$JOB_COMPLETED" +%s 2>/dev/null || echo "$COMPLETED_EPOCH")
          fi
          DURATION_SECONDS=$((COMPLETED_EPOCH - STARTED_EPOCH))

          echo "Job                       : $JOB_NAME"
          echo "Started at                : $JOB_STARTED"
          echo "Completed at              : $JOB_COMPLETED (o tiempo actual si no disponible)"
          echo "Duracion segundos         : $DURATION_SECONDS"

          # ── Escribir todas las métricas en formato Prometheus exposition ───
          printf '# HELP gaminglist_ci_build_success Estado del build (1=exitoso, 0=fallido)\n' > /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_build_success gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_build_success{branch="%s",repo="GamingList"} %s\n' "$BRANCH" "$BUILD_STATUS" >> /tmp/ci_metrics.txt

          printf '# HELP gaminglist_ci_tests_total Total de pruebas unitarias ejecutadas\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_tests_total gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_tests_total{branch="%s"} %s\n' "$BRANCH" "$TESTS_TOTAL" >> /tmp/ci_metrics.txt
          printf '# HELP gaminglist_ci_tests_passed Pruebas unitarias que pasaron\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_tests_passed gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_tests_passed{branch="%s"} %s\n' "$BRANCH" "$TESTS_PASSED" >> /tmp/ci_metrics.txt
          printf '# HELP gaminglist_ci_tests_failed Pruebas unitarias que fallaron\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_tests_failed gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_tests_failed{branch="%s"} %s\n' "$BRANCH" "$TESTS_FAILED" >> /tmp/ci_metrics.txt

          printf '# HELP gaminglist_ci_coverage_pct Porcentaje de cobertura de lineas (JaCoCo)\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_coverage_pct gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_coverage_pct{branch="%s"} %s\n' "$BRANCH" "$COVERAGE_LINE" >> /tmp/ci_metrics.txt

          printf '# HELP gaminglist_ci_branch_coverage_pct Porcentaje de cobertura de ramas (JaCoCo)\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_branch_coverage_pct gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_branch_coverage_pct{branch="%s"} %s\n' "$BRANCH" "$COVERAGE_BRANCH" >> /tmp/ci_metrics.txt

          printf '# HELP gaminglist_newman_requests_total Total de requests HTTP ejecutados por Newman\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_newman_requests_total gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_newman_requests_total{branch="%s"} %s\n' "$BRANCH" "$NEWMAN_REQUESTS_TOTAL" >> /tmp/ci_metrics.txt
          printf '# HELP gaminglist_newman_requests_failed Requests de Newman que fallaron\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_newman_requests_failed gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_newman_requests_failed{branch="%s"} %s\n' "$BRANCH" "$NEWMAN_REQUESTS_FAILED" >> /tmp/ci_metrics.txt
          printf '# HELP gaminglist_newman_assertions_total Total de aserciones (pm.test) ejecutadas\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_newman_assertions_total gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_newman_assertions_total{branch="%s"} %s\n' "$BRANCH" "$NEWMAN_ASSERTIONS_TOTAL" >> /tmp/ci_metrics.txt
          printf '# HELP gaminglist_newman_assertions_passed Aserciones de Newman que pasaron\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_newman_assertions_passed gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_newman_assertions_passed{branch="%s"} %s\n' "$BRANCH" "$NEWMAN_ASSERTIONS_PASSED" >> /tmp/ci_metrics.txt
          printf '# HELP gaminglist_newman_assertions_failed Aserciones de Newman que fallaron\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_newman_assertions_failed gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_newman_assertions_failed{branch="%s"} %s\n' "$BRANCH" "$NEWMAN_ASSERTIONS_FAILED" >> /tmp/ci_metrics.txt

          printf '# HELP gaminglist_ci_build_result Resultado del build (1=exito, 0=fallo/cancelado)\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_build_result gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_build_result{run_id="%s",conclusion="%s",workflow="%s",branch="%s",actor="%s"} %s\n' \
            "${{ github.run_id }}" "$CONCLUSION" "$WORKFLOW_NAME" "$BRANCH" "$ACTOR" "$BUILD_RESULT" >> /tmp/ci_metrics.txt

          printf '# HELP gaminglist_ci_duration_seconds Duracion del pipeline en segundos\n' >> /tmp/ci_metrics.txt
          printf '# TYPE gaminglist_ci_duration_seconds gauge\n' >> /tmp/ci_metrics.txt
          printf 'gaminglist_ci_duration_seconds{run_id="%s",job_name="%s",branch="%s"} %s\n' \
            "${{ github.run_id }}" "$JOB_NAME" "$BRANCH" "$DURATION_SECONDS" >> /tmp/ci_metrics.txt

          # Ejecutar script para parsear métricas de Cypress y densidad por RF
          python3 .github/scripts/generate_metrics.py >> /tmp/ci_metrics.txt

          echo "--- Contenido del archivo de metricas ---"
          cat /tmp/ci_metrics.txt

          # Crear archivo de configuracion HTTP con autenticacion basica para Grafana Cloud
          printf 'basic_auth:\n  username: "%s"\n  password: "%s"\n' "$GRAFANA_USER" "$GRAFANA_TOKEN" > /tmp/http_config.yml

          echo "--- Enviando a Grafana Cloud con promtool (Remote Write) ---"
          PROMTOOL_OUTPUT=$(promtool push metrics \
            --http.config.file=/tmp/http_config.yml \
            "${GRAFANA_URL}/api/prom/push" \
            /tmp/ci_metrics.txt 2>&1)
          PROMTOOL_EXIT=$?

          echo "--- Respuesta de Grafana Cloud ---"
          echo "Codigo de salida promtool: $PROMTOOL_EXIT"
          echo "Cuerpo de respuesta      : $PROMTOOL_OUTPUT"

          if [ $PROMTOOL_EXIT -eq 0 ]; then
            echo "Metricas enviadas correctamente a Grafana Cloud"
          else
            echo "Error al enviar metricas - revisa los secrets y la URL"
            exit 0
          fi
