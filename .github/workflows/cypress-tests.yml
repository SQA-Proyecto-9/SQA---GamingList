name: E2E Cypress Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Dependiendo de tu stack (Node, Python, Java), debes configurar el entorno aquí
      - name: Setup Node.js (Ejemplo si el frontend es Node)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm ci

      # Acción oficial de Cypress
      - name: Ejecutar pruebas de Cypress
        uses: cypress-io/github-action@v6
        with:
          # Comando para iniciar tu servidor local (frontend + backend)
          start: npm run start 
          # URL que Cypress esperará a que responda antes de correr las pruebas
          wait-on: 'http://localhost:3000'
          # Navegador a utilizar
          browser: chrome